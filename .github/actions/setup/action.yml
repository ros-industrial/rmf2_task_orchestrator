name: setup
description: Install Rust, pnpm, and node

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - uses: pnpm/action-setup@v4
      with:
        version: 11

    - uses: actions/setup-node@v4
      with:
        node-version: 22
