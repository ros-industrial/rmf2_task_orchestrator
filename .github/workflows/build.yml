name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  Build:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@v4
      - name: Mosquitto
        uses: namoshek/mosquitto-github-action@v1
        with:
          ports: '1883:1883'
          config: .github/mosquitto.conf

      - run: cargo build
      - run: cargo test
  