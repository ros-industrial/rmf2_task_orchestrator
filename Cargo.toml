[workspace]
members = ["amqp",
    "rmf2_task_orchestrator",
    "workflow_executor",
]
resolver = "2"

[workspace.dependencies]
crossflow = { git = "https://github.com/open-rmf/crossflow", branch = "main", features = ["diagram"] }
crossflow_diagram_editor = { git = "https://github.com/open-rmf/crossflow", branch = "main", features = ["frontend", "router"] }
axum = "0.8.6"
tokio = { version = "1.48.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tracing = "0.1.43"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
schemars = "1.2.1"
reqwest = { version = "0.12.24", features = ["json", "blocking"] }
jsonpath-rust = "1.0.4"
workflow_executor = { path = "workflow_executor" }
amqp = { path = "amqp" }
lapin = { version = "3.7.2" }
r2r = "0.9.5"
rumqttc = "0.25.1"
rclrs = "0.7.0"
chrono = "0.4.43"